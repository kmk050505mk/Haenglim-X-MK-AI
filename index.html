<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | Prompt Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --accent-primary: #FF6B00; /* HAENGLIM Orange */
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --card-hover: #111111;
            --success: #FF6B00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 0;
        }

        header {
            text-align: left;
            margin-bottom: 4rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .builder-section {
            margin-bottom: 3.5rem;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.75rem;
        }

        .option-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 60px;
        }

        .option-card:hover {
            border-color: #444;
            background: var(--card-hover);
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.05);
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
        }

        .option-label {
            font-weight: 700;
            font-size: 0.95rem; /* Korean primary label */
            margin-bottom: 0.2rem;
            display: block;
            color: var(--text-main);
        }

        .option-desc {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.2;
            font-weight: 400;
        }

        .result-container {
            margin-top: 5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 3rem;
            padding-bottom: 5rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        #final-prompt {
            width: 100%;
            height: 140px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1.25rem;
            color: #ddd;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        #final-prompt:focus {
            border-color: #444;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-secondary:hover {
            background: #111;
            border-color: #444;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }

        /* Responsive */
        @media (max-width: 640px) {
            header { margin-bottom: 3rem; }
            h1 { font-size: 1.5rem; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">PROMPT COPIED! 🚀</div>

    <div class="container">
        <header>
            <h1>HAENGLIM <span>X</span> MK AI</h1>
            <p class="subtitle">Architectural Prompt Engineering System</p>
        </header>

        <div id="builder-content">
            <!-- Categories injected here -->
        </div>

        <div class="result-container">
            <div class="result-header">
                <span class="result-title">최종 생성 프롬프트 (English Output)</span>
            </div>
            <textarea id="final-prompt" readonly placeholder="위 옵션들을 선택하여 프롬프트를 조립하세요..."></textarea>
            <div class="button-group">
                <button class="btn btn-primary" onclick="copyToClipboard()">
                    <span>프롬프트 복사하기</span>
                </button>
                <button class="btn btn-secondary" onclick="resetAll()">
                    <span>초기화</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const config = [
            {
                id: "base",
                name: "01. 기본 목적 (Base Objective)",
                options: [
                    { 
                        id: "drone_std", 
                        label: "드론뷰 변환 (Standard)", 
                        desc: "위성지도를 실사 드론 사진으로 재해석", 
                        prompt: "Transform the provided flat satellite-style landscape into a photorealistic oblique drone photograph. Preserve the overall geographic layout and land-use structure, but reinterpret it as a real aerial capture rather than a map or orthographic view." 
                    },
                    { 
                        id: "cinematic", 
                        label: "시네마틱 항공샷 (Cinematic)", 
                        desc: "웅장한 스케일과 드라마틱한 지형 표현", 
                        prompt: "Reinterpret the landscape as a cinematic, high-budget aerial photograph. Focus on dramatic scale, epic terrain relief, and a grand sense of space and perspective." 
                    }
                ]
            },
            {
                id: "camera",
                name: "02. 렌즈 및 시점 (Camera & Lens)",
                options: [
                    { 
                        id: "20mm", 
                        label: "20mm 초광각 (Ultra Wide)", 
                        desc: "극적인 공간 왜곡과 깊이감 강조", 
                        prompt: "Use a 20mm ultra-wide-angle drone lens, creating dramatic spatial distortion, exaggerated perspective, and an expansive sense of depth." 
                    },
                    { 
                        id: "24mm", 
                        label: "24mm 표준 (Standard)", 
                        desc: "자연스러운 표준 항공 원근감 (100m)", 
                        prompt: "Use a 24mm wide-angle drone lens with natural lens perspective and realistic spatial depth from approximately 100 meters above ground level." 
                    },
                    { 
                        id: "35mm", 
                        label: "35mm 집중 (Focused)", 
                        desc: "차분하고 다큐멘터리 스타일의 시선", 
                        prompt: "Use a 35mm lens for a more focused, compressed aerial perspective, providing a calm and documentary-style sense of scale." 
                    }
                ]
            },
            {
                id: "lighting",
                name: "03. 조명 및 시간대 (Lighting & Time)",
                options: [
                    { 
                        id: "morning", 
                        label: "이른 아침 (Early Morning)", 
                        desc: "상쾌한 햇살과 부드러운 그림자", 
                        prompt: "Illuminate the scene with natural early morning sunlight, creating soft realistic shadows and gentle highlights." 
                    },
                    { 
                        id: "golden", 
                        label: "골든아워 (Golden Hour)", 
                        desc: "따뜻한 톤과 시네마틱한 긴 그림자", 
                        prompt: "Illuminate the scene with warm golden hour sunlight, creating long cinematic shadows and rich highlights." 
                    }
                ]
            },
            {
                id: "atmosphere",
                name: "04. 대기 및 입체감 (Atmosphere)",
                options: [
                    { 
                        id: "mist", 
                        label: "옅은 안개 (Thin Mist)", 
                        desc: "안개를 통한 거리감과 공기 원근법", 
                        prompt: "Add thin mist and subtle atmospheric perspective to create depth and realistic distance falloff while keeping terrain details clear." 
                    },
                    { 
                        id: "clear", 
                        label: "맑음 (Crystal Clear)", 
                        desc: "매우 선명하고 깨끗한 지형 디테일", 
                        prompt: "Ensure crystal clear visibility with minimal atmospheric haze, emphasizing sharp topographic details across the entire landscape." 
                    }
                ]
            },
            {
                id: "terrain",
                name: "05. 지형 및 디테일 (Terrain & Detail)",
                options: [
                    { 
                        id: "relief", 
                        label: "지형 강조 (Pronounced Relief)", 
                        desc: "고저차 강조와 볼륨감 있는 공간감", 
                        prompt: "Emphasize pronounced terrain relief and visible land elevation. Include realistic road curvature and fine surface variation to make the landscape feel volumetric." 
                    },
                    { 
                        id: "details", 
                        label: "디테일 강화 (Fine Detail)", 
                        desc: "수풀 질감 및 차량 스케일 요소 추가", 
                        prompt: "Include small moving vehicles for realistic scale. Render detailed forest canopy and textured agricultural fields to enhance the photographic realism." 
                    }
                ]
            }
        ];

        let selections = {};

        function init() {
            const container = document.getElementById('builder-content');
            config.forEach(category => {
                const section = document.createElement('div');
                section.className = 'builder-section';
                
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = category.name;
                
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                
                category.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.dataset.catId = category.id;
                    card.dataset.optId = opt.id;
                    
                    card.innerHTML = `
                        <span class="option-label">${opt.label}</span>
                        <span class="option-desc">${opt.desc}</span>
                    `;
                    
                    card.onclick = () => selectOption(category.id, opt.id, opt.prompt);
                    grid.appendChild(card);
                });
                
                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function selectOption(catId, optId, prompt) {
            selections[catId] = prompt;
            document.querySelectorAll(`.option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
            document.querySelector(`.option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`).classList.add('selected');
            updateResult();
        }

        function updateResult() {
            const finalArea = document.getElementById('final-prompt');
            let fullPrompt = [];
            config.forEach(cat => {
                if (selections[cat.id]) fullPrompt.push(selections[cat.id]);
            });
            finalArea.value = fullPrompt.join('\n\n');
        }

        function copyToClipboard() {
            const text = document.getElementById('final-prompt').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast());
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('final-prompt').value = "";
        }

        init();
    </script>
</body>
</html>
