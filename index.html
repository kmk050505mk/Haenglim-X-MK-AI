<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | High-Quality Prompt Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --accent-primary: #FF6B00; /* HAENGLIM Orange */
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --card-hover: #111111;
            --success: #FF6B00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 950px; /* Slightly wider for more grid items */
            padding: 0;
        }

        header {
            text-align: left;
            margin-bottom: 3rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .builder-section {
            margin-bottom: 2.5rem;
        }

        .section-title {
            font-size: 0.75rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.4rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); /* Slimmer boxes */
            gap: 0.5rem;
        }

        .option-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 48px;
        }

        .option-card:hover {
            border-color: #444;
            background: var(--card-hover);
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.08);
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
        }

        .option-label {
            font-weight: 700;
            font-size: 0.82rem; /* Slightly smaller label */
            display: block;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-desc {
            font-size: 0.6rem; /* Smaller desc */
            color: var(--text-muted);
            line-height: 1.1;
            font-weight: 400;
            margin-top: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-container {
            margin-top: 4rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
            padding-bottom: 4rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        #final-prompt {
            width: 100%;
            height: 200px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            color: #ddd;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        #final-prompt:focus {
            border-color: #444;
        }

        .button-group {
            display: flex;
            gap: 0.6rem;
            margin-top: 1.2rem;
        }

        .btn {
            flex: 1;
            padding: 0.65rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-secondary:hover {
            background: #111;
            border-color: #444;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.6rem 1.5rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.75rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }

        /* Responsive */
        @media (max-width: 640px) {
            header { margin-bottom: 2rem; }
            h1 { font-size: 1.4rem; }
            .options-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">PROMPT COPIED! 🚀</div>

    <div class="container">
        <header>
            <h1>HAENGLIM <span>X</span> MK AI</h1>
            <p class="subtitle">Multi-Dimensional Prompt Engineering System</p>
        </header>

        <div id="builder-content">
            <!-- Categories injected here -->
        </div>

        <div class="result-container">
            <div class="result-header">
                <span class="result-title">초고화질 생성 프롬프트 (Ultra-Quality Output)</span>
            </div>
            <textarea id="final-prompt" readonly placeholder="위 옵션들을 선택하여 프롬프트를 조립하세요..."></textarea>
            <div class="button-group">
                <button class="btn btn-primary" onclick="copyToClipboard()">
                    <span>프롬프트 복사하기</span>
                </button>
                <button class="btn btn-secondary" onclick="resetAll()">
                    <span>초기화</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const config = [
            {
                id: "base",
                name: "00. 품질 및 변환 (Quality & Core)",
                options: [
                    { 
                        id: "hq_std", 
                        label: "초고화질 변환 설정", 
                        desc: "High-Fidelity Reconstruction", 
                        prompt: "A professional, ultra-high-resolution drone photograph reinterpreting the provided satellite layout into a realistic aerial perspective. Rendered with high-fidelity neural texture mapping and hyper-realistic surface reconstruction." 
                    }
                ]
            },
            {
                id: "perspective",
                name: "01. 시점 (Perspective)",
                options: [
                    { id: "sl_t", label: "약간 기울임", desc: "Slightly tilted", prompt: "Captured from a slightly tilted aerial perspective." },
                    { id: "mo_t", label: "적당한 기울임", desc: "Moderately tilted", prompt: "Captured from a moderately tilted oblique perspective." },
                    { id: "ci_o", label: "시네마틱 조감", desc: "Cinematic oblique", prompt: "Captured from a cinematic oblique aerial perspective." },
                    { id: "ortho", label: "탑다운 수직", desc: "Top-down ortho", prompt: "A precise top-down orthographic drone view." },
                    { id: "dyn_l", label: "다이나믹 로우", desc: "Dynamic low-angle", prompt: "A dynamic low-angle tilted aerial view for dramatic effect." }
                ]
            },
            {
                id: "altitude",
                name: "02. 고도 (Altitude)",
                options: [
                    { id: "60m", label: "60m 고도", desc: "60m AGL", prompt: "Photographed at an altitude of 60m AGL." },
                    { id: "80m", label: "80m 고도", desc: "80m AGL", prompt: "Photographed at an altitude of 80m AGL." },
                    { id: "100m", label: "100m 고도", desc: "100m AGL", prompt: "Photographed at an altitude of 100m AGL." },
                    { id: "120m", label: "120m 고도", desc: "120m AGL", prompt: "Photographed at an altitude of 120m AGL." },
                    { id: "150m", label: "150m 고도", desc: "150m AGL", prompt: "Photographed at an altitude of 150m AGL." },
                    { id: "200m", label: "200m 고도", desc: "200m AGL", prompt: "Photographed at a high-overview altitude of 200m AGL." }
                ]
            },
            {
                id: "lens",
                name: "03. 렌즈 (Lens)",
                options: [
                    { id: "14mm", label: "14mm 초광각", desc: "14mm Ultra-wide", prompt: "Using ultra-wide 14mm drone optics with deep spatial depth." },
                    { id: "20mm", label: "20mm 광각", desc: "20mm Wide", prompt: "Using a 20mm wide-angle lens for expansive view." },
                    { id: "24mm", label: "24mm 표준광각", desc: "24mm Std-wide", prompt: "Using a professional 24mm wide-angle drone lens." },
                    { id: "28mm", label: "28mm 표준", desc: "28mm Standard", prompt: "Using a balanced 28mm wide-angle lens." },
                    { id: "35mm", label: "35mm 집중", desc: "35mm Focused", prompt: "Using a 35mm lens for focused aerial compression." },
                    { id: "50mm", label: "50m 망원", desc: "50mm Telephoto", prompt: "Using 50mm telephoto optics for sharp subject isolation." }
                ]
            },
            {
                id: "time",
                name: "04. 시간대 (Time of Day)",
                options: [
                    { id: "morning", label: "이른 아침", desc: "Early morning", prompt: "Illuminated by natural early morning sunlight." },
                    { id: "golden", label: "골든아워", desc: "Golden hour", prompt: "Bathed in warm golden hour sunlight with long shadows." },
                    { id: "afternoon", label: "늦은 오후", desc: "Late afternoon", prompt: "Featuring the sharp light of late afternoon sun." },
                    { id: "midday", label: "한낮", desc: "Midday sun", prompt: "Under bright midday sun with high-dynamic-range lighting." },
                    { id: "overcast", label: "흐림", desc: "Soft overcast", prompt: "Under soft overcast lighting with diffuse shadows." },
                    { id: "blue", label: "블루아워", desc: "Blue hour", prompt: "Captured during blue hour with subtle ambient city glow." },
                    { id: "night", label: "야경", desc: "Night view", prompt: "A cinematic night aerial view with vibrant city lights." }
                ]
            },
            {
                id: "atmosphere",
                name: "05. 안개/대기감 (Atmosphere)",
                options: [
                    { id: "mist", label: "옅은 안개", desc: "Thin mist", prompt: "Thin volumetric mist adds realistic depth." },
                    { id: "haze_l", label: "가벼운 헤이즈", desc: "Light haze", prompt: "Light atmospheric haze creates a sense of distance." },
                    { id: "haze_s", label: "미묘한 헤이즈", desc: "Subtle haze", prompt: "Subtle haze enhances the geographic scale." },
                    { id: "clear", label: "맑은 대기", desc: "Crystal clear", prompt: "Perfectly clear air ensures razor-sharp visibility." },
                    { id: "foggy", label: "짙은 안개", desc: "Dense fog", prompt: "Dense volumetric fog creates a moody atmosphere." },
                    { id: "stormy", label: "폭풍우/구름", desc: "Stormy/Cloudy", prompt: "Stormy overcast skies with dramatic cloud formations." }
                ]
            },
            {
                id: "terrain",
                name: "06. 지형 강조 (Terrain Relief)",
                options: [
                    { id: "flat", label: "평탄한 지형", desc: "Flat terrain", prompt: "Rendered with flat geographic topography." },
                    { id: "subtle", label: "미묘한 강조", desc: "Subtle relief", prompt: "Featuring subtle terrain relief for natural variation." },
                    { id: "visible", label: "보통 강조", desc: "Visible relief", prompt: "Emphasizing visible terrain relief and elevation." },
                    { id: "strong", label: "강한 강조", desc: "Strong relief", prompt: "Emphasizing strong terrain relief and volumetric landmass." },
                    { id: "exag", label: "극적인 강조", desc: "Exaggerated", prompt: "Dramatic exaggerated relief highlighting steep elevations." }
                ]
            },
            {
                id: "scale",
                name: "07. 스케일 요소 (Scale Elements)",
                options: [
                    { id: "none", label: "차량 0대", desc: "No vehicles", prompt: "The landscape is quiet with no vehicles visible." },
                    { id: "tiny", label: "미세한 교통", desc: "Tiny traffic", prompt: "Includes tiny traffic elements for realistic scale." },
                    { id: "heavy", label: "많은 교통", desc: "Heavy traffic", prompt: "Featuring heavy traffic activity on the road infrastructure." },
                    { id: "ped", label: "사람 추가", desc: "Pedestrians", prompt: "Includes visible pedestrians for a human-scale sense of life." },
                    { id: "cons", label: "건설 현장", desc: "Construction", prompt: "Includes construction cranes and assets for site context." }
                ]
            },
            {
                id: "color",
                name: "08. 색감 (Color Grade)",
                options: [
                    { id: "natural", label: "자연스러움", desc: "Natural photo", prompt: "Processed with natural photographic colors." },
                    { id: "neutral", label: "중립적", desc: "Neutral balance", prompt: "Maintaining a neutral and authentic color balance." },
                    { id: "documentary", label: "다큐멘터리", desc: "Raw authentic", prompt: "A raw documentary-style color grade." },
                    { id: "cinematic", label: "시네마틱", desc: "Cinematic grade", prompt: "A cinematic color grade with professional mapping." },
                    { id: "vibrant", label: "선명한 색감", desc: "Vibrant", prompt: "Vibrant and saturated colors for an energetic look." },
                    { id: "muted", label: "차분한 색감", desc: "Muted/Misty", prompt: "Desaturated and muted tones for a calm atmosphere." }
                ]
            },
            {
                id: "aspect",
                name: "09. 화면 비율 (Aspect Ratio)",
                options: [
                    { id: "1_1", label: "1:1", desc: "Square", prompt: "--ar 1:1" },
                    { id: "3_2", label: "3:2", desc: "Standard", prompt: "--ar 3:2" },
                    { id: "2_3", label: "2:3", desc: "Portrait", prompt: "--ar 2:3" },
                    { id: "16_9", label: "16:9", desc: "Widescreen", prompt: "--ar 16:9" },
                    { id: "21_9", label: "21:9", desc: "Ultrawide", prompt: "--ar 21:9" }
                ]
            }
        ];

        let selections = {};

        function init() {
            const container = document.getElementById('builder-content');
            config.forEach(category => {
                const section = document.createElement('div');
                section.className = 'builder-section';
                
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = category.name;
                
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                
                category.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.dataset.catId = category.id;
                    card.dataset.optId = opt.id;
                    
                    card.innerHTML = `
                        <span class="option-label">${opt.label}</span>
                        <span class="option-desc">${opt.desc}</span>
                    `;
                    
                    card.onclick = () => selectOption(category.id, opt.id, opt.prompt);
                    grid.appendChild(card);
                });
                
                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });

            selectOption("base", "hq_std", config[0].options[0].prompt);
            selectOption("aspect", "16_9", "--ar 16:9");
        }

        function selectOption(catId, optId, prompt) {
            selections[catId] = prompt;
            document.querySelectorAll(`.option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
            document.querySelector(`.option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`).classList.add('selected');
            updateResult();
        }

        function updateResult() {
            const finalArea = document.getElementById('final-prompt');
            let mainPrompts = [];
            let parameters = [];
            
            config.forEach(cat => {
                if (selections[cat.id]) {
                    if (cat.id === 'aspect') {
                        parameters.push(selections[cat.id]);
                    } else {
                        mainPrompts.push(selections[cat.id]);
                    }
                }
            });
            
            const qualityBooster = "-- High-fidelity, 8k resolution, photorealistic, sharp focus, architectural drone photography style, raw photo --";
            
            finalArea.value = mainPrompts.join(' ') + '\n\n' + qualityBooster + '\n\n' + parameters.join(' ');
        }

        function copyToClipboard() {
            const text = document.getElementById('final-prompt').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast());
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('final-prompt').value = "";
            selectOption("base", "hq_std", config[0].options[0].prompt);
            selectOption("aspect", "16_9", "--ar 16:9");
        }

        init();
    </script>
</body>
</html>
