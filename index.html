<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | Integrated System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: rgba(8, 8, 8, 0.8);
            --sidebar-width: 70px;
            --accent-primary: #FF6B00;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --card-hover: #111111;
            --glow-color: rgba(255, 107, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: block; /* Revert to block for original layout feel */
            letter-spacing: -0.02em;
        }

        /* Endfield Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(20, 20, 20, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 20, 20, 0.5) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }

        /* Sidebar Overlay Style (Left-side navigation) */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 0;
            z-index: 1000;
        }

        .nav-item {
            width: 44px;
            height: 44px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid transparent;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: all 0.4s;
        }

        .nav-item:hover svg {
            fill: var(--text-main);
            transform: scale(1.1);
        }

        .nav-item.active {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .nav-item.active svg {
            fill: var(--accent-primary);
        }

        /* Indicator Line */
        .nav-item.active::before {
            content: "";
            position: absolute;
            left: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent-primary);
            animation: indicatorPulse 1.5s infinite ease-in-out;
        }

        @keyframes indicatorPulse {
            0%, 100% { height: 16px; opacity: 0.6; }
            50% { height: 28px; opacity: 1; }
        }

        /* Main Content - Preserving Original Center Layout */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px; /* Original Max Width */
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        @keyframes initialFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: left;
            margin-bottom: 4rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* Chapter Transition System */
        .chapter {
            display: none;
            width: 100%;
        }

        .chapter.active {
            display: block;
            animation: chapterIn 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .chapter.fade-out {
            animation: chapterOut 0.5s forwards ease-in;
        }

        @keyframes chapterIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes chapterOut {
            from { opacity: 1; transform: translateY(0); filter: blur(0); }
            to { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
        }

        /* Builder Styling (Maintained from original) */
        .builder-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        .option-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 46px; /* Slightly shorter */
        }

        .option-card:hover {
            border-color: #444;
            background: var(--card-hover);
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.08);
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
        }

        .option-label {
            font-weight: 700;
            font-size: 0.78rem; /* Reduced from 0.9rem */
            display: block;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-desc {
            font-size: 0.58rem; /* Reduced from 0.65rem */
            color: var(--text-muted);
            line-height: 1.1;
            font-weight: 400;
            margin-top: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Locked / Coming Soon State */
        .nav-item.locked {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .nav-item.locked:hover {
            background: transparent;
            box-shadow: none;
        }
        .chapter-locked-overlay {
            position: relative;
            width: 100%;
            min-height: 60vh;
        }
        .chapter-locked-overlay .locked-content {
            filter: blur(8px);
            opacity: 0.3;
            pointer-events: none;
            user-select: none;
        }
        .chapter-locked-overlay .locked-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        .locked-badge span {
            display: block;
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 0.3rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .locked-badge small {
            display: block;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.1rem;
        }

        /* New Split-Screen Layout Architecture */
        .app-container {
            display: flex;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
        }

        /* Main Content Area (Options Grid) */
        .content-area {
            flex: 1;
            padding: 4rem 3rem 4rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-right: 1px solid var(--border-color); /* Boundary line */
        }

        .container {
            width: 100%;
            max-width: 1000px;
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        /* Sticky Result Sidebar - Guaranteed No Overlap */
        .result-sidebar {
            width: 400px;
            min-width: 400px;
            height: 100vh;
            position: sticky;
            top: 0;
            background: #080808;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .result-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: panelEntrance 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes panelEntrance {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-header {
            margin-bottom: 2rem;
            border-left: 3px solid var(--accent-primary);
            padding-left: 1rem;
        }

        .result-title {
            font-weight: 900;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            font-family: 'Outfit', sans-serif;
        }

        #final-prompt {
            flex: 1;
            width: 100%;
            background: #000;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 1.5rem;
            color: #bbb;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        #final-prompt:focus {
            border-color: var(--accent-primary);
            color: #fff;
        }

        .side-button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .btn:not(.btn-primary):hover {
            background: var(--card-hover);
            border-color: #444;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }
    </style>
</head>

                    { id: "t_heavy", label: "많은 교통", desc: "Heavy traffic", prompt: "Featuring heavy traffic activity on the road infrastructure." },
                    { id: "t_busy", label: "복잡한 교통", desc: "Busy urban flow", prompt: "A busy urban environment with dense vehicular activity." }
                ]
            },
            {
                id: "pedestrian",
                name: "08-1. 인적 스케일 (Pedestrians)",
                options: [
                    { id: "p_none", label: "사람 없음", desc: "No people", prompt: "No pedestrians are visible, creating a clean architectural look." },
                    { id: "p_tiny", label: "미세한 사람 추가", desc: "Tiny pedestrians", prompt: "Includes tiny pedestrians to provide a human-scale reference." },
                    { id: "p_mod", label: "적당한 사람 추가", desc: "Some pedestrians", prompt: "Featuring some pedestrians walking through the landscape." },
                    { id: "p_many", label: "많은 사람 추가", desc: "Many pedestrians", prompt: "Featuring a lively environment with many pedestrians visible." },
                    { id: "p_crowd", label: "활기찬 인파", desc: "Active crowd", prompt: "A lively and active crowd provides a vibrant sense of place." }
                ]
            },
            {
                id: "color",
                name: "09. 색감 (Color Grade)",
                options: [
                    { id: "natural", label: "자연스러움", desc: "Natural photo", prompt: "Processed with natural photographic colors." },
                    { id: "neutral", label: "중립적", desc: "Neutral balance", prompt: "Maintaining a neutral and authentic color balance." },
                    { id: "documentary", label: "다큐멘터리", desc: "Raw authentic", prompt: "A raw documentary-style color grade." },
                    { id: "cinematic", label: "시네마틱", desc: "Cinematic grade", prompt: "A cinematic color grade with professional mapping." },
                    { id: "vibrant", label: "선명한 색감", desc: "Vibrant", prompt: "Vibrant and saturated colors for an energetic look." },
                    { id: "muted", label: "차분한 색감", desc: "Muted/Misty", prompt: "Desaturated and muted tones for a calm atmosphere." }
                ]
            }
        ];

        const config2 = [
            { id:"c2_base", name:"00. 변환 모드 (Transform Mode)", options:[
                { id:"comp", label:"공모전 패널", desc:"Competition panel", prompt:"Use the uploaded image as the sole reference. Preserve the original spatial structure, architectural composition, layout, camera viewpoint, perspective, proportions, and placement of key elements as accurately as possible. Do not redesign or rearrange." },
                { id:"sketch", label:"러프 스케치", desc:"Raw ballpoint sketch", prompt:"Transform the input architectural perspective image into a very raw sketch that feels halfway between a doodle and an architectural concept drawing, made with a black Monami-style ballpoint pen on light paper." }
            ]},
            { id:"c2_style", name:"01. 표현 스타일 (Expression Style)", options:[
                { id:"sanaa", label:"SANAA 여백감", desc:"Bright, delicate", prompt:"SANAA-inspired bright and delicate sense of negative space, ultra-thin linework, high-key white background, wide negative space, clean vector composition." },
                { id:"oma", label:"OMA 미니멀", desc:"Info-driven minimal", prompt:"OMA-inspired information-driven minimalism, flat bright color fields, restrained pastel palette, minimal shading." },
                { id:"big", label:"BIG 공간 읽힘", desc:"Clear spatial read", prompt:"BIG-inspired clear spatial legibility, elegant simplified people, curated planting graphics, Adobe Illustrator-like architectural presentation quality." },
                { id:"rough", label:"즉흥 두들", desc:"Impulsive doodle", prompt:"Redraw the scene with chaotic overlapping lines, rough construction marks, shaky contours, loose perspective hints, scribbled hatching, incomplete edges." },
                { id:"pastel", label:"파스텔 일러스트", desc:"Post-digital pastel", prompt:"A post-digital architectural illustration, soft diffused daylight, pastel tones, mute colors, paper grain texture, peaceful and gentle atmosphere." }
            ]},
            { id:"c2_line", name:"02. 선 표현 (Linework)", options:[
                { id:"thin", label:"얇은 선", desc:"Ultra-thin lines", prompt:"ultra-thin linework with precise architectural detail." },
                { id:"medium", label:"보통 선", desc:"Medium weight", prompt:"medium-weight clean linework for balanced readability." },
                { id:"rough_l", label:"거친 선", desc:"Rough freehand", prompt:"rough freehand lines with organic imperfections and hand-drawn quality." },
                { id:"none_l", label:"선 없음", desc:"No outlines", prompt:"no visible outlines, using color fields and shading only." }
            ]},
            { id:"c2_color", name:"03. 색상 팔레트 (Color Palette)", options:[
                { id:"mono", label:"흑백 모노톤", desc:"80-90% monochrome", prompt:"80-90% monochrome black and white, with only 10-20% very light pastel accents." },
                { id:"pastel_c", label:"파스텔 톤", desc:"Muted pastel", prompt:"Pastel tones, mute colors, restrained and curated palette." },
                { id:"warm", label:"따뜻한 톤", desc:"Warm earth tones", prompt:"warm earth tones with beige, sand, and dusty peach accents." },
                { id:"cool", label:"차가운 톤", desc:"Cool sage/mint", prompt:"cool-toned palette with sage green, mint, powder blue accents." },
                { id:"bw", label:"완전 흑백", desc:"Pure B&W", prompt:"completely monochrome black and white with no color accents." }
            ]},
            { id:"c2_remove", name:"04. 제거 요소 (Remove)", options:[
                { id:"rm_tex", label:"실사 텍스처 제거", desc:"No photorealism", prompt:"Remove photorealistic textures, strong shadows, glossy effects, excessive color contrast, cartoon style, and game-render aesthetics." },
                { id:"rm_none", label:"제거 없음", desc:"Keep original", prompt:"" }
            ]}
        ];

        const config3 = [
            { id:"c3_base", name:"00. 업스케일 모드 (Upscale Mode)", options:[
                { id:"full", label:"초고해상도 실사", desc:"8K DSLR realism", prompt:"Use the original image as a strict reference and preserve 100% identity, face structure, pose, and composition. Perform ultra-high-resolution 8K upscaling with maximum detail enhancement." }
            ]},
            { id:"c3_texture", name:"01. 텍스처 보정 (Texture)", options:[
                { id:"skin", label:"피부 질감 강화", desc:"Pores & fine lines", prompt:"Add realistic skin texture with visible pores, fine lines, and natural imperfections, avoiding any plastic or artificial smoothing." },
                { id:"arch", label:"건축 재질 강화", desc:"Material fidelity", prompt:"Enhance architectural material textures including concrete grain, glass reflections, metal patina, and wood grain with photorealistic fidelity." },
                { id:"land", label:"조경 디테일 강화", desc:"Vegetation detail", prompt:"Enhance vegetation textures with individual leaf detail, grass blades, bark texture, and natural color variation in foliage." },
                { id:"none_t", label:"원본 유지", desc:"Preserve original", prompt:"Preserve original texture characteristics without additional enhancement." }
            ]},
            { id:"c3_detail", name:"02. 세부 보정 (Detail Enhancement)", options:[
                { id:"face", label:"얼굴 디테일", desc:"Eyes, lips, hair", prompt:"Enhance facial details including sharp eyes, realistic eyelashes, natural eyebrows, detailed lips, and individual hair strands." },
                { id:"struct", label:"구조물 디테일", desc:"Building edges", prompt:"Enhance structural details with sharp building edges, window mullions, facade patterns, and precise geometric forms." },
                { id:"env", label:"환경 디테일", desc:"Sky, water, ground", prompt:"Enhance environmental details including realistic sky gradients, water reflections, ground textures, and atmospheric depth." }
            ]},
            { id:"c3_camera", name:"03. 카메라 룩 (Camera Look)", options:[
                { id:"85mm", label:"85mm 인물", desc:"Portrait lens", prompt:"Apply professional DSLR camera quality using a full-frame camera look with a premium 85mm lens." },
                { id:"50mm_c", label:"50mm 표준", desc:"Standard lens", prompt:"Apply professional DSLR camera quality using a full-frame camera look with a premium 50mm lens." },
                { id:"24mm_c", label:"24mm 건축", desc:"Architecture lens", prompt:"Apply professional architectural photography look using a tilt-shift 24mm lens with controlled perspective." },
                { id:"drone_c", label:"드론 항공", desc:"Aerial drone", prompt:"Apply high-end drone camera look with DJI Mavic-quality optics and aerial perspective correction." }
            ]},
            { id:"c3_light", name:"04. 조명 보정 (Lighting)", options:[
                { id:"studio", label:"스튜디오 조명", desc:"Key+fill+rim", prompt:"Improve lighting with a natural key light, soft fill light, and subtle rim light to separate the subject from the background." },
                { id:"natural_l", label:"자연광", desc:"Natural daylight", prompt:"Enhance with natural daylight quality, balanced exposure, and true-to-life color temperature." },
                { id:"cine_l", label:"시네마틱", desc:"Cinematic grade", prompt:"Apply cinematic yet realistic color grading with accurate skin tones and authentic depth of field." },
                { id:"hdr", label:"HDR 보정", desc:"Dynamic range", prompt:"Balance highlights and shadows with improved dynamic range and true-to-life colors. Reduce noise and compression artifacts." }
            ]}
        ];

        const config4 = [
            { id:"c4_type", name:"00. 다이어그램 유형 (Diagram Type)", options:[
                { id:"3x3", label:"3x3 진화 다이어그램", desc:"9-frame evolution", prompt:"A 9-frame architectural design evolution diagram in a 3x3 grid on a white background. All frames maintain the same isometric axonometric viewpoint, same site form, and same scale." },
                { id:"concept", label:"컨셉 다이어그램", desc:"Single concept", prompt:"A single-frame architectural concept diagram showing spatial relationships and design intent." },
                { id:"exploded", label:"분해 다이어그램", desc:"Exploded axon", prompt:"An exploded axonometric diagram showing layered building components separated vertically." },
                { id:"flow", label:"동선 다이어그램", desc:"Circulation flow", prompt:"A circulation flow diagram showing pedestrian and vehicular movement patterns with directional arrows." }
            ]},
            { id:"c4_view", name:"01. 시점 (Viewpoint)", options:[
                { id:"axon", label:"등각 투영", desc:"Isometric axon", prompt:"Rendered in isometric axonometric viewpoint." },
                { id:"plan", label:"평면 다이어그램", desc:"Plan view", prompt:"A top-down plan view diagram." },
                { id:"section_v", label:"단면 다이어그램", desc:"Section diagram", prompt:"An architectural section diagram of the building." },
                { id:"persp", label:"투시 다이어그램", desc:"Perspective", prompt:"A perspective diagram with depth and foreshortening." }
            ]},
            { id:"c4_style", name:"02. 표현 스타일 (Diagram Style)", options:[
                { id:"minimal", label:"미니멀 공모전", desc:"Competition board", prompt:"Thin black and grey linework, subtle shading, spacious architectural competition panel style. Minimal architectural competition board, axonometric evolution diagram, monochrome with soft pastel accents, calm and refined layout." },
                { id:"tech", label:"테크니컬", desc:"Technical drawing", prompt:"precise technical drawing style with dimension lines, annotations, and hatching patterns." },
                { id:"illust", label:"일러스트레이션", desc:"Soft illustration", prompt:"soft architectural illustration style with gentle gradients and artistic composition." }
            ]},
            { id:"c4_color_d", name:"03. 색상 체계 (Color System)", options:[
                { id:"bw_acc", label:"흑백+파스텔 악센트", desc:"B&W + accents", prompt:"80-90% monochrome, 10-20% very light pastel accents only (greenery=sage green/mint/olive, pedestrian/plaza=beige/sand, public program=dusty peach, environmental systems=powder blue)." },
                { id:"full_c", label:"풀 컬러", desc:"Full color coded", prompt:"color-coded diagram with distinct colors for each program zone and clear legend." },
                { id:"mono_d", label:"완전 모노톤", desc:"Pure monochrome", prompt:"completely monochrome diagram using only black, white, and grey tones." }
            ]},
            { id:"c4_label", name:"04. 라벨 언어 (Labels)", options:[
                { id:"kr", label:"한글 라벨", desc:"Korean labels", prompt:"All frame titles and inset labels must be in Korean." },
                { id:"en", label:"영어 라벨", desc:"English labels", prompt:"All frame titles and labels in English." },
                { id:"dual", label:"한/영 병기", desc:"Bilingual", prompt:"Labels in both Korean and English bilingual format." }
            ]},
            { id:"c4_neg", name:"05. 금지 요소 (Negative Prompt)", options:[
                { id:"strict", label:"엄격한 제한", desc:"Strict rules", prompt:"No photorealistic rendering, no excessive saturation, no thick lines, no complex textures, no heavy shadows, no viewpoint changes between frames, no disorderly layout, no exaggerated planting or decoration." },
                { id:"loose", label:"유연한 제한", desc:"Flexible rules", prompt:"Avoid photorealistic rendering and excessive decoration, but allow creative interpretation." }
            ]}
        ];

        const allConfigs = { 1: config, 2: config2, 3: config3, 4: config4 };
        const subtitles = { 1:"Aerial Perspective Prompt Builder", 2:"Style Transform Prompt Builder", 3:"Upscaling Prompt Builder", 4:"Diagram Prompt Builder" };
        const boosters = {
            1: "-- High-fidelity, 8k resolution, photorealistic, sharp focus, architectural drone photography style, raw photo --",
            2: "-- The final image should look quiet, premium, and highly curated, resembling an architectural and landscape presentation panel graphic. --",
            3: "-- Output should look ultra-photorealistic, high-end studio quality, DSLR-level realism. Increase clarity and sharpness naturally without over-sharpening. --",
            4: "-- professional architectural concept panel, clean white background, diagrammatic and elegant --"
        };
        let currentChapter = 1;

        function buildChapter(num, containerId) {
            const container = document.getElementById(containerId);
            if (!container || container.children.length > 0) return;
            const cfg = allConfigs[num];
            cfg.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'builder-section';
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = cat.name;
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                cat.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.dataset.catId = cat.id;
                    card.dataset.optId = opt.id;
                    card.innerHTML = `<span class="option-label">${opt.label}</span><span class="option-desc">${opt.desc}</span>`;
                    card.onclick = () => selectOption(cat.id, opt.id, opt.prompt);
                    grid.appendChild(card);
                });
                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        function init() {
            buildChapter(1, 'builder-content');
            selectOption("base", "hq_std", config[0].options[0].prompt);
            selectOption("aspect", "16_9", "--ar 16:9");
        }

        const lockedChapters = [4];

        function switchChapter(num) {
            const current = document.querySelector('.chapter.active');
            if(current.id === `chapter-${num}`) return;
            currentChapter = num;
            const containerMap = {1:'builder-content', 2:'builder-content-2', 3:'builder-content-3', 4:'builder-content-4'};
            buildChapter(num, containerMap[num]);
            current.classList.add('fade-out');
            selections = {};
            setTimeout(() => {
                document.querySelectorAll('.chapter').forEach(c => { c.classList.remove('active'); c.classList.remove('fade-out'); });
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                document.getElementById(`chapter-${num}`).classList.add('active');
                const navItem = document.querySelectorAll('.nav-item')[num-1];
                navItem.classList.add('active');
                document.getElementById('chapter-subtitle').innerText = subtitles[num];
                if(lockedChapters.includes(num)) {
                    document.getElementById('final-prompt').value = '[ LOCKED ] This module is currently under development.';
                } else {
                    document.getElementById('final-prompt').value = '';
                }
            }, 500);
        }

        function selectOption(catId, optId, prompt) {
            selections[catId] = prompt;
            document.querySelectorAll(`.option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
            const target = document.querySelector(`.option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`);
            if(target) target.classList.add('selected');
            updateResult();
        }

        function updateResult() {
            const area = document.getElementById('final-prompt');
            const cfg = allConfigs[currentChapter];
            let p = [], a = [];
            cfg.forEach(cat => {
                if(selections[cat.id]) {
                    if(cat.id === 'aspect') a.push(selections[cat.id]);
                    else if(selections[cat.id]) p.push(selections[cat.id]);
                }
            });
            area.value = p.join(' ') + '\n\n' + boosters[currentChapter] + (a.length ? '\n\n' + a.join(' ') : '');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('final-prompt').value).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll(`#chapter-${currentChapter} .option-card`).forEach(c => c.classList.remove('selected'));
            document.getElementById('final-prompt').value = '';
            if(currentChapter === 1) {
                selectOption("base", "hq_std", config[0].options[0].prompt);
                selectOption("aspect", "16_9", "--ar 16:9");
            }
        }

        init();
    </script>
</body>
</html>
