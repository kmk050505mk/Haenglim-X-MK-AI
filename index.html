<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | Integrated System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --sidebar-bg: rgba(8, 8, 8, 0.8);
            --sidebar-width: 70px;
            --accent-primary: #FF6B00;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --card-hover: #111111;
            --glow-color: rgba(255, 107, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: block; /* Revert to block for original layout feel */
            letter-spacing: -0.02em;
        }

        /* Endfield Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(20, 20, 20, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 20, 20, 0.5) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -1;
            pointer-events: none;
        }

        /* Sidebar Overlay Style (Left-side navigation) */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 0;
            z-index: 1000;
        }

        .nav-item {
            width: 44px;
            height: 44px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid transparent;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: all 0.4s;
        }

        .nav-item:hover svg {
            fill: var(--text-main);
            transform: scale(1.1);
        }

        .nav-item.active {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .nav-item.active svg {
            fill: var(--accent-primary);
        }

        /* Indicator Line */
        .nav-item.active::before {
            content: "";
            position: absolute;
            left: -2px;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent-primary);
            animation: indicatorPulse 1.5s infinite ease-in-out;
        }

        @keyframes indicatorPulse {
            0%, 100% { height: 16px; opacity: 0.6; }
            50% { height: 28px; opacity: 1; }
        }

        /* Main Content - Preserving Original Center Layout */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            padding: 4rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px; /* Original Max Width */
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        @keyframes initialFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: left;
            margin-bottom: 4rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.2rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* Chapter Transition System */
        .chapter {
            display: none;
            width: 100%;
        }

        .chapter.active {
            display: block;
            animation: chapterIn 0.8s forwards cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .chapter.fade-out {
            animation: chapterOut 0.5s forwards ease-in;
        }

        @keyframes chapterIn {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes chapterOut {
            from { opacity: 1; transform: translateY(0); filter: blur(0); }
            to { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
        }

        /* Builder Styling (Maintained from original) */
        .builder-section {
            margin-bottom: 3rem;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }

        .option-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 46px; /* Slightly shorter */
        }

        .option-card:hover {
            border-color: #444;
            background: var(--card-hover);
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.08);
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
        }

        .option-label {
            font-weight: 700;
            font-size: 0.78rem; /* Reduced from 0.9rem */
            display: block;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-desc {
            font-size: 0.58rem; /* Reduced from 0.65rem */
            color: var(--text-muted);
            line-height: 1.1;
            font-weight: 400;
            margin-top: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* New Split-Screen Layout Architecture */
        .app-container {
            display: flex;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            width: calc(100% - var(--sidebar-width));
        }

        /* Main Content Area (Options Grid) */
        .content-area {
            flex: 1;
            padding: 4rem 3rem 4rem 4rem;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            border-right: 1px solid var(--border-color); /* Boundary line */
        }

        .container {
            width: 100%;
            max-width: 1000px;
            opacity: 0;
            transform: translateY(10px);
            animation: initialFadeIn 1s forwards ease-out;
        }

        /* Sticky Result Sidebar - Guaranteed No Overlap */
        .result-sidebar {
            width: 400px;
            min-width: 400px;
            height: 100vh;
            position: sticky;
            top: 0;
            background: #080808;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .result-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            animation: panelEntrance 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        @keyframes panelEntrance {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-header {
            margin-bottom: 2rem;
            border-left: 3px solid var(--accent-primary);
            padding-left: 1rem;
        }

        .result-title {
            font-weight: 900;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            font-family: 'Outfit', sans-serif;
        }

        #final-prompt {
            flex: 1;
            width: 100%;
            background: #000;
            border: 1px solid #222;
            border-radius: 4px;
            padding: 1.5rem;
            color: #bbb;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 2rem;
        }

        #final-prompt:focus {
            border-color: var(--accent-primary);
            color: #fff;
        }

        .side-button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            width: 100%;
            padding: 0.8rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 15px var(--glow-color);
        }

        .btn:not(.btn-primary):hover {
            background: var(--card-hover);
            border-color: #444;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 2000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }
    </style>
</head>

        let selections = {};

        function init() {
            const container = document.getElementById('builder-content');
            config.forEach(category => {
                const section = document.createElement('div');
                section.className = 'builder-section';
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = category.name;
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                category.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.dataset.catId = category.id;
                    card.dataset.optId = opt.id;
                    card.innerHTML = `<span class="option-label">${opt.label}</span><span class="option-desc">${opt.desc}</span>`;
                    card.onclick = () => selectOption(category.id, opt.id, opt.prompt);
                    grid.appendChild(card);
                });
                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });
            selectOption("base", "hq_std", config[0].options[0].prompt);
            selectOption("aspect", "16_9", "--ar 16:9");
        }

        function switchChapter(num) {
            const current = document.querySelector('.chapter.active');
            if(current.id === `chapter-${num}`) return;
            current.classList.add('fade-out');
            setTimeout(() => {
                document.querySelectorAll('.chapter').forEach(c => {
                    c.classList.remove('active');
                    c.classList.remove('fade-out');
                });
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const target = document.getElementById(`chapter-${num}`);
                target.classList.add('active');
                document.querySelectorAll('.nav-item')[num-1].classList.add('active');
                document.getElementById('chapter-subtitle').innerText = num === 1 ? "Integrated Prompt Engineering System" : "Module & Component Library";
            }, 500);
        }

        function selectOption(catId, optId, prompt) {
            selections[catId] = prompt;
            document.querySelectorAll(`.option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
            document.querySelector(`.option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`).classList.add('selected');
            updateResult();
        }

        function updateResult() {
            const area = document.getElementById('final-prompt');
            let p = [], a = [];
            config.forEach(cat => {
                if(selections[cat.id]) {
                    if(cat.id === 'aspect') a.push(selections[cat.id]);
                    else p.push(selections[cat.id]);
                }
            });
            const booster = "-- High-fidelity, 8k resolution, photorealistic, sharp focus, architectural drone photography style, raw photo --";
            area.value = p.join(' ') + '\n\n' + booster + '\n\n' + a.join(' ');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('final-prompt').value).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            selectOption("base", "hq_std", config[0].options[0].prompt);
            selectOption("aspect", "16_9", "--ar 16:9");
        }

        init();
    </script>
</body>
</html>
