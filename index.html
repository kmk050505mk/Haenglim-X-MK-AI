<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAENGLIM x MK AI | Prompt Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #000000;
            --accent-primary: #FF6B00; /* HAENGLIM Orange */
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --card-hover: #111111;
            --success: #FF6B00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            letter-spacing: -0.02em;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 0;
        }

        header {
            text-align: left;
            margin-bottom: 4rem;
            border-left: 4px solid var(--accent-primary);
            padding-left: 1.5rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            letter-spacing: 0.05em;
        }

        h1 span {
            color: var(--accent-primary);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .builder-section {
            margin-bottom: 3.5rem;
        }

        .section-title {
            font-size: 0.8rem;
            letter-spacing: 0.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.6rem;
        }

        .option-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 50px;
        }

        .option-card:hover {
            border-color: #444;
            background: var(--card-hover);
        }

        .option-card.selected {
            border-color: var(--accent-primary);
            background: rgba(255, 107, 0, 0.05);
        }

        .option-card.selected::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-primary);
        }

        .option-label {
            font-weight: 700;
            font-size: 0.9rem;
            display: block;
            color: var(--text-main);
        }

        .option-desc {
            font-size: 0.65rem;
            color: var(--text-muted);
            line-height: 1.2;
            font-weight: 400;
            margin-top: 0.1rem;
        }

        .result-container {
            margin-top: 5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 3rem;
            padding-bottom: 5rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .result-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        #final-prompt {
            width: 100%;
            height: 180px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1.25rem;
            color: #ddd;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            line-height: 1.6;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        #final-prompt:focus {
            border-color: #444;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-secondary:hover {
            background: #111;
            border-color: #444;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 100px);
            background: var(--accent-primary);
            color: #000;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.8rem;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 1000;
        }

        .toast.show {
            transform: translate(-50%, 0);
        }

        /* Responsive */
        @media (max-width: 640px) {
            header { margin-bottom: 3rem; }
            h1 { font-size: 1.5rem; }
            .options-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast">PROMPT COPIED! 🚀</div>

    <div class="container">
        <header>
            <h1>HAENGLIM <span>X</span> MK AI</h1>
            <p class="subtitle">Architectural Prompt Engineering System</p>
        </header>

        <div id="builder-content">
            <!-- Categories injected here -->
        </div>

        <div class="result-container">
            <div class="result-header">
                <span class="result-title">최종 생성 프롬프트 (English Output)</span>
            </div>
            <textarea id="final-prompt" readonly placeholder="위 옵션들을 선택하여 프롬프트를 조립하세요..."></textarea>
            <div class="button-group">
                <button class="btn btn-primary" onclick="copyToClipboard()">
                    <span>프롬프트 복사하기</span>
                </button>
                <button class="btn btn-secondary" onclick="resetAll()">
                    <span>초기화</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const config = [
            {
                id: "base",
                name: "00. 기본 설정 (Core Setup)",
                options: [
                    { 
                        id: "drone_std", 
                        label: "드론뷰 기본 변환", 
                        desc: "위성지도를 실사 항공사진으로 변환", 
                        prompt: "Transform the provided flat satellite-style landscape into a photorealistic drone photograph. Preserve the overall geographic layout while reinterpreting it as a real aerial capture." 
                    }
                ]
            },
            {
                id: "perspective",
                name: "01. 시점 (Perspective)",
                options: [
                    { id: "slightly", label: "약간 기울임", desc: "Slightly tilted", prompt: "Captured from a slightly tilted aerial perspective." },
                    { id: "moderately", label: "적당한 기울임", desc: "Moderately tilted", prompt: "Captured from a moderately tilted aerial perspective for balanced depth." },
                    { id: "cinematic", label: "시네마틱 조감", desc: "More cinematic oblique", prompt: "Captured from a dramatic, more cinematic oblique aerial perspective." }
                ]
            },
            {
                id: "altitude",
                name: "02. 고도 (Altitude)",
                options: [
                    { id: "60m", label: "60m", desc: "저고도 촬영", prompt: "Photographed at a low altitude of approximately 60m above ground level." },
                    { id: "80m", label: "80m", desc: "표준 저고도", prompt: "Photographed at an altitude of approximately 80m above ground level." },
                    { id: "100m", label: "100m", desc: "표준 고도", prompt: "Photographed at a standard drone altitude of 100m above ground level." },
                    { id: "120m", label: "120m", desc: "표준 고고도", prompt: "Photographed at an altitude of approximately 120m above ground level." },
                    { id: "150m", label: "150m", desc: "고고도 촬영", prompt: "Photographed at a high altitude of approximately 150m above ground level, providing a wider view." }
                ]
            },
            {
                id: "lens",
                name: "03. 렌즈 (Lens)",
                options: [
                    { id: "20mm", label: "20mm", desc: "초광각 렌즈", prompt: "Using a 20mm ultra-wide drone lens for expansive spatial distortion." },
                    { id: "24mm", label: "24mm", desc: "광각 렌즈", prompt: "Using a 24mm wide-angle drone lens for natural perspective." },
                    { id: "28mm", label: "28mm", desc: "표준 광각", prompt: "Using a 28mm wide-angle lens for a realistic and balanced view." },
                    { id: "35mm", label: "35mm", desc: "차분한 렌즈", prompt: "Using a 35mm lens for a more focused and compressed aerial perspective." }
                ]
            },
            {
                id: "time",
                name: "04. 시간대 (Time of Day)",
                options: [
                    { id: "morning", label: "이른 아침", desc: "Early morning", prompt: "The scene is illuminated by natural early morning sunlight, creating soft shadows." },
                    { id: "golden", label: "골든아워", desc: "Golden hour", prompt: "The scene is bathed in warm golden hour sunlight, creating long cinematic shadows." },
                    { id: "afternoon", label: "늦은 오후", desc: "Late afternoon", prompt: "Illuminated by late afternoon sun, providing rich highlights and deep shadows." },
                    { id: "midday", label: "한낮", desc: "Midday", prompt: "Under bright midday sun, resulting in high contrast and clear visibility." },
                    { id: "overcast", label: "흐림", desc: "Overcast", prompt: "Under soft overcast lighting, providing diffuse shadows and natural colors." }
                ]
            },
            {
                id: "atmosphere",
                name: "05. 안개/대기감 (Atmosphere)",
                options: [
                    { id: "mist", label: "옅은 안개", desc: "Thin mist", prompt: "Thin mist adds a realistic atmospheric distance falloff and depth." },
                    { id: "haze_l", label: "가벼운 헤이즈", desc: "Light haze", prompt: "Light haze creates a gentle atmospheric perspective." },
                    { id: "haze_s", label: "미묘한 헤이즈", desc: "Subtle haze", prompt: "A subtle haze enhances the sense of scale and distance." },
                    { id: "clear", label: "맑은 대기", desc: "Clear air", prompt: "Crystal clear air ensures sharp visibility across the entire landscape." }
                ]
            },
            {
                id: "terrain",
                name: "06. 지형 강조 (Terrain Relief)",
                options: [
                    { id: "subtle", label: "미묘한 강조", desc: "Subtle relief", prompt: "Featuring subtle terrain relief for a natural topographic feel." },
                    { id: "visible", label: "보통 강조", desc: "Visible relief", prompt: "Emphasizing visible terrain relief to highlight land elevation." },
                    { id: "strong", label: "강한 강조", desc: "Strong relief", prompt: "Emphasizing strong terrain relief for dramatic topographic variation." }
                ]
            },
            {
                id: "scale",
                name: "07. 스케일 요소 (Scale Elements)",
                options: [
                    { id: "car", label: "차량 1대", desc: "Small moving car", prompt: "Includes a small moving car for human-scale reference." },
                    { id: "vehicles", label: "차량 몇 대", desc: "A few vehicles", prompt: "A few vehicles are visible, enhancing the realism of the infrastructure." },
                    { id: "traffic", label: "미세한 교통", desc: "Tiny traffic", prompt: "Tiny traffic elements provide a realistic sense of scale and life." }
                ]
            },
            {
                id: "color",
                name: "08. 색감 (Color Grade)",
                options: [
                    { id: "natural", label: "자연스러움", desc: "Natural", prompt: "Processed with natural photographic colors." },
                    { id: "neutral", label: "중립적", desc: "Neutral", prompt: "Maintaining a neutral and realistic color balance." },
                    { id: "documentary", label: "다큐멘터리", desc: "Documentary", prompt: "A documentary-style color grade for a raw, authentic look." },
                    { id: "cinematic", label: "약간 시네마틱", desc: "Slightly cinematic", prompt: "A slightly cinematic color grade with enhanced contrast and mood." }
                ]
            }
        ];

        let selections = {};

        function init() {
            const container = document.getElementById('builder-content');
            config.forEach(category => {
                const section = document.createElement('div');
                section.className = 'builder-section';
                
                const title = document.createElement('div');
                title.className = 'section-title';
                title.innerText = category.name;
                
                const grid = document.createElement('div');
                grid.className = 'options-grid';
                
                category.options.forEach(opt => {
                    const card = document.createElement('div');
                    card.className = 'option-card';
                    card.dataset.catId = category.id;
                    card.dataset.optId = opt.id;
                    
                    card.innerHTML = `
                        <span class="option-label">${opt.label}</span>
                        <span class="option-desc">${opt.desc}</span>
                    `;
                    
                    card.onclick = () => selectOption(category.id, opt.id, opt.prompt);
                    grid.appendChild(card);
                });
                
                section.appendChild(title);
                section.appendChild(grid);
                container.appendChild(section);
            });

            // Auto-select Base Setup
            selectOption("base", "drone_std", config[0].options[0].prompt);
        }

        function selectOption(catId, optId, prompt) {
            selections[catId] = prompt;
            document.querySelectorAll(`.option-card[data-cat-id="${catId}"]`).forEach(card => card.classList.remove('selected'));
            document.querySelector(`.option-card[data-cat-id="${catId}"][data-opt-id="${optId}"]`).classList.add('selected');
            updateResult();
        }

        function updateResult() {
            const finalArea = document.getElementById('final-prompt');
            let fullPrompt = [];
            config.forEach(cat => {
                if (selections[cat.id]) fullPrompt.push(selections[cat.id]);
            });
            finalArea.value = fullPrompt.join(' ');
        }

        function copyToClipboard() {
            const text = document.getElementById('final-prompt').value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast());
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function resetAll() {
            selections = {};
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
            document.getElementById('final-prompt').value = "";
            // Auto-select Base Setup again
            selectOption("base", "drone_std", config[0].options[0].prompt);
        }

        init();
    </script>
</body>
</html>
